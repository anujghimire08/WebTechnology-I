<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-mail Validation</title>
  </head>
  <body>
    <form>
      <input type="text" placeholder="Enter Email" id="inputmail" />
      <input type="text" id="result" readonly style="color: red" />
      <input type="submit" value="Submit" />
    </form>
    <script>
      const form = document.querySelector("form");
      const result = document.querySelector("#result");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const mail = document.querySelector("#inputmail").value.trim();
        result.value =
          /^(?!.*\.\.)[a-zA-Z0-9+._%-]+@[a-zA-Z.-]+\.[a-zA-Z]{2,}(\.[A-Za-z]{2,})?$/.test(mail)
            ? "Valid Email"
            : "Invalid Email";
        let time = setTimeout(function () {
          form.reset();
        }, 900);
      });
    </script>
  </body>
</html>
