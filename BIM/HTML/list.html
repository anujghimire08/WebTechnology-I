<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>list</title>
  </head>
  <body>
    <fieldset>
      <legend>Order List</legend>
      <ol type="A">
        <li>
          hello
          <ol type="i" start="3">
            <li>
              Anuj
              <ol type="1" start="2">
                <li>Ghimire</li>
              </ol>
            </li>
          </ol>
        </li>
        <li>hello</li>
        <li>hello</li>
        <li>hello</li>
      </ol>
    </fieldset>
    <br />
    <br />
    <fieldset>
      <legend>Unorder List</legend>
      <ul>
        <li>
          hello
          <ul type="circle">
            <li>
              Anuj
              <ul type="square">
                <li>Ghimire</li>
              </ul>
            </li>
          </ul>
        </li>
        <li>hello</li>
        <li>hello</li>
        <li>hello</li>
      </ul>
    </fieldset>
    <br /><br />
    <fieldset>
      <legend>Description List</legend>
      <dl>
        <dt>HTTL</dt>
        <dd>Hypertext Markup Language</dd>
      </dl>
    </fieldset>
    <br /><br />
    <fieldset>
      <legend>Custom Type</legend>
      <ul
        style="
          list-style-image: url(https://media.tenor.com/FYyZ3NiN6jcAAAAM/backflip-fail.gif);
          list-style-position: inside;
        "
      >
        <li>hello</li>
        <li>hello</li>
        <li>hello</li>
        <li>hello</li>
      </ul>
    </fieldset>
  </body>
</html>
