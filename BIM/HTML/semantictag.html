<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sectioning Tag Example</title>
  </head>

  <body>
    <header>
      <h1>My Website</h1>
    </header>

    <nav>Home | About | Contact</nav>

    <main>
      <section>
        <h2>Section Area</h2>
        <p>This is a section of content.</p>
      </section>

      <article>
        <h2>Article Title</h2>
        <p>This is an independent article (blog/news).</p>
      </article>
    </main>

    <aside>
      <p>Sidebar content (ads, links, etc.)</p>
    </aside>

    <footer>
      <p>© 2026 My Website</p>
      <address>Kathmandu, Nepal</address>
    </footer>
  </body>
</html>
