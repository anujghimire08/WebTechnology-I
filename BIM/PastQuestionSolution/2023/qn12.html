<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Creation</title>
  <style>
    table{
      border-collapse: collapse;
    }
    td,th{
      border: 1px solid;
      padding: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Anuj</th>
        <th colspan="3">Ghimire</th>
      </tr>
    </thead>
    <tbody>
      <tr>
      <td>3</td>
      <td>3</td>
      <td colspan="2">2</td>
    </tr>
    <tr>
      <td>BIM</td>
      <td>BIM</td>
      <td>BIM</td>
      <td>BIM</td>
    </tr>
    </tbody>
  </table>
</body>
</html>
