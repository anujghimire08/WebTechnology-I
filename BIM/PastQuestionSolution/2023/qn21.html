<!-- 21. Create the following form in HTML and write JavaScript code to validate phone, email,password and confirm password, and user id (number only). -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation</title>
  <link rel="stylesheet" href="qn21.css">
</head>
<body>
<form>
  <label>User ID:</label>
    <input type="text" id="userid"><br><br>

    <label>Phone:</label>
    <input type="text" id="phone"><br><br>

    <label>Email:</label>
    <input type="text" id="email"><br><br>

    <label>Password:</label>
    <input type="password" id="password"><br><br>

    <label>Confirm Password:</label>
    <input type="password" id="confirm"><br><br>

    <button type="submit">Sign Up</button>
</form>
<script src="qn21.js"></script>
</body>
</html>
