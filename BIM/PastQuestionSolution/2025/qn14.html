<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Creation</title>
    <style>
      table {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table frame="box" rules="all" cellpadding="10">
      <thead>
        <tr>
          <td rowspan="2">S.N</td>
          <td rowspan="2">Name</td>
          <td colspan="2">phone</td>
        </tr>
        <tr>
          <td>Home</td>
          <td>Office</td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Ram</td>
          <td>014423659</td>
          <td>9876543210</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Sita</td>
          <td>014444444</td>
          <td>9789965432</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
