<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Styling</title>
  </head>
  <body>
    <table frame="box" rules="all" cellpadding="10">
      <thead>
        <tr>
          <th>Subject</th>
          <th>John Doe</th>
          <th>Miriam</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="2">Biology</td>
          <td>Practical:A</td>
          <td>Practical:A</td>
        </tr>
        <tr>
          <td>Theory: A <sup>+</sup></td>
          <td>Theory: A</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
