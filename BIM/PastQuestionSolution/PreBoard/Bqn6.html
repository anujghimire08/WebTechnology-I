<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odd Value Sum</title>
  </head>
  <body></body>
  <script>
    let arr = [1, 2, 3, 4, 5, 6];
    let sum = 0;
    arr.forEach((el) => {
      if (el % 2 !== 0) sum += el;
    });
    document.writeln(sum);
  </script>
</html>
