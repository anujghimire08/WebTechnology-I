<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Info Table</title>
    <style>
      table,
      th,
      tr,
      td {
        border-collapse: collapse;
        border: 2px solid blue;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th colspan="2">Name</th>
          <th>Roll</th>
          <th colspan="2">Class</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>First Name</td>
          <td>Last Name</td>
          <td>1</td>
          <td>Grade</td>
          <td>Section</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
