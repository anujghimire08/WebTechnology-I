<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>table styling</title>
    <style>
      table {
        border-collapse: collapse;
        width: 80%;
        margin: 2rem auto;
        font-family: Arial, sans-serif;
      }

      th,
      td {
        border: 1px solid black;
        padding: 0.5rem 1rem;
        text-align: center;
      }

      th {
        background-color: #f0f0f0;
      }

      th:nth-child(odd) {
        background-color: #a0c4ff; /* light blue for even columns */
      }

      th:nth-child(even) {
        background-color: #f0f0f0; /* light gray for odd columns */
      }

      caption {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Anuj's marks
      </caption>
      <thead>
        <tr>
          <th>DSA</th>
          <th>Web</th>
          <th>Account</th>
          <th>Statistic</th>
          <th>Microprocessor</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>10</td>
          <td>20</td>
          <td>30</td>
          <td>40</td>
          <td>50</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
