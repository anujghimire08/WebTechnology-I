<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>table styling</title>
    <style>
      table,
      th,
      td {
        border-collapse: collapse;
        border: 1px solid black;
        text-align: center;
        padding: 0.4rem;
      }
      th {
        background-color: lightblue;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Anuj's marks
      </caption>
      <thead>
        <th>DSA</th>
        <th>Web</th>
        <th>Account</th>
        <th>Statistic</th>
        <th>Microprocessor</th>
      </thead>
      <tbody>
        <tr>
          <td>10</td>
          <td>20</td>
          <td>30</td>
          <td>40</td>
          <td>50</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
