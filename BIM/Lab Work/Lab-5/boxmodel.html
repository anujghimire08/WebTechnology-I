<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box model</title>
    <style>
      .parent {
        width: 200px;
        height: 200px;
        background-color: red;
        border: 2px solid black;
        box-sizing: border-box;
        border-radius: 0.1rem;
        padding: 0.3rem;
        margin: 0.2rem;
      }
      .child {
        width: 100px;
        height: 100px;
        background-color: #fff;
        box-sizing: border-box;
        border: 2px solid black;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="parent"><div class="child">im child</div></div>
  </body>
</html>
