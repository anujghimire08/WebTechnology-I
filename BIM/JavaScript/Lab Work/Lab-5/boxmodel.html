<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>box model</title>
    <style>
      div {
        width: 200px;
        height: 200px;
        background-color: #000;
        border: 2px solid gray;
        box-sizing: border-box;
        border-radius: 1rem;
        padding: 0.8rem;
        margin: 2rem 4rem;
        color: white;
        outline: 2px solid gold;
      }
    </style>
  </head>
  <body>
    <div>container</div>
  </body>
</html>
