<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPT Verification</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <form class="container">
      <div id="image-container">
        <img src="phone.png" alt="phone" />
      </div>
      <div id="heading">
        <h5>What's your mobile number?</h5>
      </div>
      <div id="user-input">
        <fieldset>
          <legend>Mobile Number</legend>
          <div id="input-container">
            <img src="Flag_of_Nepal.png" alt="nepal flag" />
            <input type="number" name="phonenumber" id="user-number" />
          </div>
        </fieldset>
        <p id="info">We need this to verify and secure your account</p>
      </div>

      <button id="continue-btn">
        <p><i class="ri-check-line"></i>&nbsp;Continue</p>
      </button>
    </form>
    <script src="app.js"></script>
  </body>
</html>
