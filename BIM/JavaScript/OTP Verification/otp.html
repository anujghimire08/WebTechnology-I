<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPT Verification</title>
    <link rel="stylesheet" href="otp.css" />
  </head>
  <body>
    <form class="container">
      <div id="image-container">
        <img src="opt.png" alt="phone" />
      </div>
      <div id="heading">
        <h5>Verify Code</h5>
        <p id="info">
          Check your SMS inbox, we have sent you the code at
          <span id="phone-number"></span>.
        </p>
      </div>
      <div id="input-container">
        <input type="text" maxlength="1" /><input
          type="text"
          maxlength="1"
        /><input type="text" maxlength="1" /><input type="text" maxlength="1" />
      </div>
      <button id="verify-btn">Verify</button>
      <p id="no-code">Didn't get a code?<span id="timer"></span></p>
    </form>
    <div id="popup"></div>
    <p id="result"></p>
    <script src="otp.js"></script>
  </body>
</html>
