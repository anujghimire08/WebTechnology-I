<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SumGenerator</title>
  </head>
  <body>
    <script>
      let num1 = Number(prompt("Enter Number First"));
      let num2 = Number(prompt("Enter Number Second"));

      const sumGenerator = (num1, num2) => num1 + num2;
      console.log(sumGenerator(num1, num2));
    </script>
  </body>
