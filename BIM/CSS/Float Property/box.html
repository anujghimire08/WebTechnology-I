<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float</title>
    <style>
      section {
        width: 20rem;
        background-color: lightsalmon;
      }
      section > div {
        width: 10rem;
        height: 10rem;
        float: left;
      }
      #one {
        background-color: red;
      }
      #two {
        background-color: green;
      }
      #three {
        background-color: blue;
      }
      #four {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <section>
      <div id="one">red</div>
      <div id="two">green</div>
      <div id="three">blue</div>
      <div id="four">yellow</div>
    </section>
  </body>
</html>
