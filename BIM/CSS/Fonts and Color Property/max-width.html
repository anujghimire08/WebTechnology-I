<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>max-width</title>
    <style>
      div {
        max-width: 200px;
        width: 100px;
        height: 200px;
        background-color: red;
        border: 2px solid blue;
        padding: 10px;
        margin: 10px;
        /* Total Width = padding(right-left) + margin(right-left) + border(right-left) + content */
      }
    </style>
  </head>
  <body>
    <div>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Sint, delectus?
    </div>
  </body>
</html>
